; XenoCipher Healthcare IoT - PlatformIO (Windows) setup

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
  -DXENOCIPHER_VERSION_MAJOR=1
  -DXENOCIPHER_VERSION_MINOR=0
  -DXENOCIPHER_VERSION_PATCH=0
  -DDEBUG_LEVEL=3
  -Wall
  -Wextra
  -Os
  -std=c++17

lib_deps =
  bblanchon/ArduinoJson@^6.21.3
  me-no-dev/ESPAsyncTCP@^1.2.2   ; Async HTTP client

; mbedTLS is available in the ESP32 Arduino core; we include headers directly.

lib_extra_dirs =
    lib
