; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32 @ 6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool
upload_port = COM8

; === Build Flags ===
build_flags = 
    ; Project version
    -DXENOCIPHER_VERSION_MAJOR=1
    -DXENOCIPHER_VERSION_MINOR=0
    -DXENOCIPHER_VERSION_PATCH=0

    ; Debugging
    -DDEBUG_LEVEL=3
    -Wall
    -Wextra
    -Os
    -std=c++17

    ; === Critical memory optimizations ===
    -D PIO_FRAMEWORK_ARDUINO_MAXIMUM_STACK_SIZE=24576
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -D CONFIG_MAIN_TASK_STACK_SIZE=4096
    -D CONFIG_ARDUHAL_LOG_COLORS=1

    ; === ArduinoJson memory settings ===
    -D ARDUINOJSON_USE_DOUBLE=0
    -D ARDUINOJSON_ENABLE_STD_STRING=0
    -D ARDUINOJSON_ENABLE_STD_STREAM=0
    -D ARDUINOJSON_ENABLE_PROGMEM=1
    -D ARDUINOJSON_DECODE_UNICODE=0

lib_deps = 
    bblanchon/ArduinoJson@^6.21.3

lib_extra_dirs = 
    lib

build_src_flags = 
    -Ilib/NTRU/include
    -Ilib/Entropy/include
    -Ilib/HMAC/include
    -Ilib/LFSR/include
    -Ilib/Tinkerbell/include
    -Ilib/Transposition/include
    -Ilib/CryptoKDF/include

monitor_filters = 
    esp32_exception_decoder
    colorize
    time

; === Additional environment for debugging ===
[env:esp32dev_debug]
extends = env:esp32dev
build_flags = 
